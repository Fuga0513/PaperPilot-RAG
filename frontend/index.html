<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperPilot-RAG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" class="app-wrapper app-shell">
        <!-- Auth Screen -->
        <main v-if="!isAuthenticated" class="auth-screen">
            <section class="auth-panel">
                <div class="auth-brand">
                    <div class="auth-logo">PP</div>
                    <div>
                        <h1>PaperPilot-RAG</h1>
                        <p class="auth-subtitle">Research-Oriented Agentic RAG Assistant</p>
                    </div>
                </div>
                <p class="auth-description">Log in to manage your research paper library, chat sessions, and RAG tools.</p>

                <div v-if="authError" class="auth-alert auth-alert-error">{{ authError }}</div>
                <div v-if="authNotice" class="auth-alert auth-alert-success">{{ authNotice }}</div>

                <form class="auth-form" @submit.prevent="handleAuthSubmit">
                    <input v-model="authForm.username" type="text" autocomplete="username" placeholder="Username" :disabled="authLoading">
                    <input v-model="authForm.password" type="password" autocomplete="current-password" placeholder="Password" :disabled="authLoading">
                    <select v-if="authMode === 'register'" v-model="authForm.role" :disabled="authLoading">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                    <input
                        v-if="authMode === 'register' && authForm.role === 'admin'"
                        v-model="authForm.admin_code"
                        type="password"
                        placeholder="Admin invite code"
                        :disabled="authLoading"
                    >
                    <p v-if="authMode === 'register' && authForm.role === 'admin'" class="auth-help">
                        Admin accounts require the ADMIN_INVITE_CODE configured in the backend .env file.
                    </p>
                    <button type="submit" class="primary-action" :disabled="authLoading || !authForm.username || !authForm.password">
                        <i v-if="authLoading" class="fas fa-spinner fa-spin"></i>
                        <span>{{ authLoading ? 'Submitting...' : (authMode === 'login' ? 'Log In' : 'Register') }}</span>
                    </button>
                    <button type="button" class="text-action" :disabled="authLoading" @click="switchAuthMode">
                        {{ authMode === 'login' ? 'Need an account? Register' : 'Already have an account? Log in' }}
                    </button>
                </form>
            </section>
        </main>

        <!-- PaperPilot Main Shell -->
        <template v-else>
            <aside class="app-sidebar sidebar">
                <div class="sidebar-brand">
                    <div class="brand-mark">PP</div>
                    <div>
                        <strong>PaperPilot</strong>
                        <span>Agentic RAG</span>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <button @click="setActivePanel('library')" :class="['nav-btn', {active: activeNav === 'library'}]">
                        <i class="fas fa-book-open"></i> Paper Library
                    </button>
                    <button @click="setActivePanel('upload')" :class="['nav-btn', {active: activeNav === 'upload'}]">
                        <i class="fas fa-cloud-arrow-up"></i> Upload Paper
                    </button>
                    <button @click="handleNewChat" :class="['nav-btn', {active: activeNav === 'chat'}]">
                        <i class="fas fa-comments"></i> Chat with Papers
                    </button>
                    <button @click="handleHistory" :class="['nav-btn', {active: activeNav === 'history'}]">
                        <i class="fas fa-clock-rotate-left"></i> Session History
                    </button>
                    <button v-if="isAdmin" @click="setActivePanel('documents')" :class="['nav-btn', {active: activeNav === 'documents'}]">
                        <i class="fas fa-folder-tree"></i> Global Documents
                    </button>
                </nav>

                <section class="sidebar-section">
                    <h3>Current Paper</h3>
                    <div v-if="selectedPaper" class="selected-paper">
                        <strong>{{ formatPaperTitle(selectedPaper) }}</strong>
                        <span class="sidebar-paper-file">{{ selectedPaper.original_filename || selectedPaper.filename }}</span>
                        <div class="sidebar-paper-meta">
                            <span :class="['paper-status', paperStatusClass(selectedPaper.status)]">{{ formatPaperStatus(selectedPaper.status) }}</span>
                            <span v-if="selectedPaperDetail?.chunk_count">{{ selectedPaperDetail.chunk_count }} chunks</span>
                        </div>
                        <span v-if="selectedPaper.year || selectedPaper.venue">{{ selectedPaper.year || '-' }} / {{ selectedPaper.venue || 'Venue pending' }}</span>
                    </div>
                    <div v-else class="selected-paper empty-paper-hint">
                        <strong>No paper selected.</strong>
                        <span>Upload or select a paper to ground your answers.</span>
                    </div>
                </section>

                <details class="sidebar-section advanced-tools">
                    <summary>Advanced Tools</summary>
                    <button class="tool-entry" @click="setActivePanel('reviewer')">Reviewer Analysis</button>
                    <button class="tool-entry" @click="setActivePanel('writing')">Research Writing</button>
                    <button class="tool-entry" @click="setActivePanel('memory')">Memory / Project</button>
                    <button class="tool-entry" @click="setActivePanel('evaluation')">Evaluation Report</button>
                    <button v-if="isAdmin" class="tool-entry" @click="setActivePanel('documents')">Global Document Admin</button>
                </details>
            </aside>

            <main class="main-content main-area">
                <header class="top-header">
                    <div>
                        <h1>PaperPilot-RAG</h1>
                        <p>Research-Oriented Agentic RAG Assistant</p>
                    </div>
                    <div class="header-user">
                        <div class="user-avatar">{{ currentUserInitials }}</div>
                        <div class="user-chip">
                            <span>{{ currentUser.username }}</span>
                            <small>{{ currentUser.role }}</small>
                        </div>
                        <button class="secondary-action" @click="logout()">
                            <i class="fas fa-right-from-bracket"></i> Log out
                        </button>
                    </div>
                </header>

                <div v-if="errorMessage" class="app-alert">
                    <span>{{ errorMessage }}</span>
                    <button @click="clearError"><i class="fas fa-xmark"></i></button>
                </div>

                <div class="workspace workspace-grid">
                    <section class="content-column">
                        <section v-if="activeNav === 'library'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Paper Library</h2>
                                    <p>Your uploaded papers are isolated by the current logged-in user.</p>
                                    <p v-if="isAdmin" class="admin-note">Admin note: this panel is still your personal paper library. Use Global Documents for the shared RAG knowledge base.</p>
                                </div>
                                <button class="secondary-action" :disabled="loading.papers" @click="loadPapers">
                                    <i :class="loading.papers ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>
                            <div class="workspace-tabs">
                                <button :class="{active: activeLibraryTab === 'papers'}" @click="activeLibraryTab = 'papers'">
                                    <i class="fas fa-list"></i> Papers
                                </button>
                                <button :class="{active: activeLibraryTab === 'comparison'}" @click="activeLibraryTab = 'comparison'">
                                    <i class="fas fa-table-columns"></i> Comparison
                                </button>
                            </div>
                            <div class="library-layout">
                                <div class="library-list">
                                    <section v-if="activeLibraryTab === 'comparison'" class="comparison-box">
                                        <div class="comparison-heading">
                                            <div>
                                                <strong>Paper Comparison</strong>
                                                <small>{{ selectedPaperCount }}/5 selected</small>
                                            </div>
                                            <button
                                                class="primary-action"
                                                :disabled="isComparingPapers || selectedPaperCount < 2"
                                                @click="compareSelectedPapers"
                                            >
                                                <i :class="isComparingPapers ? 'fas fa-spinner fa-spin' : 'fas fa-table-columns'"></i>
                                                {{ isComparingPapers ? 'Comparing...' : 'Compare Selected Papers' }}
                                            </button>
                                        </div>
                                        <textarea
                                            v-model="comparisonQuery"
                                            rows="2"
                                            :disabled="isComparingPapers"
                                            placeholder="Comparison focus"
                                        ></textarea>
                                        <p v-if="selectedPaperCount < 2" class="comparison-help">Select at least two papers from your private library.</p>
                                        <div v-if="comparisonResult" class="comparison-result" v-html="parseMarkdown(comparisonResult)"></div>
                                    </section>
                                    <div v-if="loading.papers" class="empty-state">Loading papers...</div>
                                    <div v-else-if="papers.length === 0" class="empty-state">No papers uploaded yet.</div>
                                    <div v-else class="paper-list">
                                        <article
                                            v-for="paper in papers"
                                            :key="paper.id"
                                            :class="['paper-item', {active: selectedPaper?.id === paper.id, selected: selectedPaperIds.includes(paper.id)}]"
                                        >
                                            <label class="paper-select-row">
                                                <input
                                                    type="checkbox"
                                                    :checked="selectedPaperIds.includes(paper.id)"
                                                    :disabled="isComparingPapers"
                                                    @change="togglePaperSelection(paper.id)"
                                                >
                                                <span>Select</span>
                                            </label>
                                            <i :class="getPaperIcon(paper.filename)"></i>
                                            <span>{{ formatPaperTitle(paper) }}</span>
                                            <small>{{ paper.authors || 'Authors pending' }}</small>
                                            <small>{{ paper.year || '-' }} · {{ paper.venue || 'Venue pending' }}</small>
                                            <small :class="['paper-status', paperStatusClass(paper.status)]">{{ paper.status }}</small>
                                            <small>Uploaded {{ formatDate(paper.created_at) }}</small>
                                            <div class="paper-row-actions">
                                                <button class="text-action paper-open-action" @click="selectPaper(paper)">Details</button>
                                                <button
                                                    class="danger-action compact-action"
                                                    :disabled="deletingPaperIds.includes(paper.id)"
                                                    @click.stop="deletePaper(paper)"
                                                >
                                                    <i :class="deletingPaperIds.includes(paper.id) ? 'fas fa-spinner fa-spin' : 'fas fa-trash'"></i>
                                                    {{ deletingPaperIds.includes(paper.id) ? 'Deleting' : 'Delete' }}
                                                </button>
                                            </div>
                                        </article>
                                    </div>
                                </div>
                                <aside class="paper-detail">
                                    <div v-if="!selectedPaper" class="empty-state compact">Select a paper to view details.</div>
                                    <div v-else-if="loading.paperDetail" class="empty-state compact">Loading paper detail...</div>
                                    <template v-else>
                                        <h3>{{ formatPaperTitle(selectedPaperDetail || selectedPaper) }}</h3>
                                        <button
                                            class="secondary-action detail-action"
                                            :disabled="loading.paperDetail || isParsingPaper"
                                            @click="parseSelectedPaper"
                                        >
                                            <i :class="isParsingPaper ? 'fas fa-spinner fa-spin' : 'fas fa-wand-magic-sparkles'"></i>
                                            {{ isParsingPaper ? 'Parsing...' : 'Parse / Reparse' }}
                                        </button>
                                        <button
                                            class="secondary-action detail-action"
                                            :disabled="loading.paperDetail || isIndexingPaper || !selectedPaperDetail || selectedPaperDetail.chunk_count === 0"
                                            @click="indexSelectedPaper"
                                        >
                                            <i :class="isIndexingPaper ? 'fas fa-spinner fa-spin' : 'fas fa-database'"></i>
                                            {{ isIndexingPaper ? 'Indexing...' : 'Index / Reindex' }}
                                        </button>
                                        <button
                                            class="danger-action detail-action"
                                            :disabled="deletingPaperIds.includes(selectedPaper.id)"
                                            @click="deletePaper(selectedPaper)"
                                        >
                                            <i :class="deletingPaperIds.includes(selectedPaper.id) ? 'fas fa-spinner fa-spin' : 'fas fa-trash'"></i>
                                            {{ deletingPaperIds.includes(selectedPaper.id) ? 'Deleting...' : 'Delete Paper' }}
                                        </button>
                                        <dl>
                                            <dt>Authors</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).authors || 'Not available yet.' }}</dd>
                                            <dt>Abstract</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).abstract || 'Not available yet.' }}</dd>
                                            <dt>Status</dt>
                                            <dd>
                                                <span :class="['paper-status', paperStatusClass((selectedPaperDetail || selectedPaper).status)]">
                                                    {{ (selectedPaperDetail || selectedPaper).status }}
                                                </span>
                                                <span v-if="(selectedPaperDetail || selectedPaper).status === 'indexed'">Indexing completed.</span>
                                                <span v-if="(selectedPaperDetail || selectedPaper).status === 'index_failed'">Indexing failed.</span>
                                            </dd>
                                            <dt>Chunks</dt>
                                            <dd>{{ selectedPaperDetail?.chunk_count ?? 'Not parsed yet.' }}</dd>
                                            <dt>Filename</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).original_filename || (selectedPaperDetail || selectedPaper).filename }}</dd>
                                        </dl>
                                        <div class="metadata-box">
                                            <strong>Metadata</strong>
                                            <p v-if="(selectedPaperDetail || selectedPaper).status === 'metadata_failed'">Metadata extraction failed.</p>
                                            <p v-else-if="!(selectedPaperDetail && selectedPaperDetail.metadata)">Metadata not available yet.</p>
                                            <dl v-else class="metadata-detail-list">
                                                <dt>Contributions</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.contributions) }}</dd>
                                                <dt>Method Modules</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.method_modules) }}</dd>
                                                <dt>Datasets</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.datasets) }}</dd>
                                                <dt>Metrics</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.metrics) }}</dd>
                                                <dt>Limitations</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.limitations) }}</dd>
                                            </dl>
                                        </div>
                                    </template>
                                </aside>
                            </div>
                        </section>

                        <section v-if="activeNav === 'upload'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Upload Paper</h2>
                                    <p>Upload PDF, DOCX, or TXT files into your private Paper Library.</p>
                                </div>
                            </div>
                            <div class="upload-area">
                                <input ref="fileInput" type="file" accept=".pdf,.docx,.txt" :disabled="isUploading" @change="handleFileSelect">
                                <div v-if="selectedFile" class="selected-file">
                                    <i class="fas fa-file"></i>
                                    <span>{{ selectedFile.name }}</span>
                                </div>
                                <button class="primary-action" :disabled="isUploading || !selectedFile" @click="uploadDocument">
                                    <i :class="isUploading ? 'fas fa-spinner fa-spin' : 'fas fa-cloud-arrow-up'"></i>
                                    {{ isUploading ? 'Uploading...' : 'Upload Paper' }}
                                </button>
                                <div v-if="uploadProgress" class="upload-status">{{ uploadProgress }}</div>
                                <div v-if="uploadSteps.length" class="upload-step-list">
                                    <div v-for="step in uploadSteps" :key="step.key" class="upload-step">
                                        <div class="upload-step-header">
                                            <span>{{ step.label }}</span>
                                            <small>{{ step.percent }}%</small>
                                        </div>
                                        <div class="upload-step-bar">
                                            <div class="upload-step-fill" :style="{ width: step.percent + '%' }"></div>
                                        </div>
                                        <p v-if="step.message">{{ step.message }}</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section v-if="activeNav === 'documents' && isAdmin" class="panel admin-documents-panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Global Documents</h2>
                                    <p>Admin-only PaperPilot-RAG knowledge base. These files are shared global RAG documents, separate from user-owned papers.</p>
                                </div>
                                <button class="secondary-action" :disabled="documentsLoading" @click="loadDocuments">
                                    <i :class="documentsLoading ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>

                            <div class="admin-documents-layout">
                                <section class="global-upload-box">
                                    <h3>Upload Global Document</h3>
                                    <input ref="globalFileInput" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx" :disabled="isUploading" @change="handleFileSelect">
                                    <div v-if="selectedFile" class="selected-file">
                                        <i class="fas fa-file"></i>
                                        <span>{{ selectedFile.name }}</span>
                                    </div>
                                    <button class="primary-action" :disabled="isUploading || !selectedFile" @click="uploadGlobalDocument">
                                        <i :class="isUploading ? 'fas fa-spinner fa-spin' : 'fas fa-cloud-arrow-up'"></i>
                                        {{ isUploading ? 'Uploading...' : 'Upload to Global RAG' }}
                                    </button>
                                    <div v-if="uploadProgress" class="upload-status">{{ uploadProgress }}</div>
                                    <div v-if="uploadSteps.length" class="upload-step-list">
                                        <div v-for="step in uploadSteps" :key="step.key" class="upload-step">
                                            <div class="upload-step-header">
                                                <span>{{ step.label }}</span>
                                                <small>{{ step.percent }}%</small>
                                            </div>
                                            <div class="upload-step-bar">
                                                <div class="upload-step-fill" :style="{ width: step.percent + '%' }"></div>
                                            </div>
                                            <p v-if="step.message">{{ step.message }}</p>
                                        </div>
                                    </div>
                                </section>

                                <section class="global-document-list">
                                    <h3>Indexed Global Documents</h3>
                                    <div v-if="documentsLoading" class="empty-state compact">Loading documents...</div>
                                    <div v-else-if="documents.length === 0" class="empty-state compact">No global documents indexed.</div>
                                    <article v-for="doc in documents" :key="doc.filename" class="global-document-card">
                                        <div>
                                            <strong>{{ doc.filename }}</strong>
                                            <small>{{ doc.file_type || '-' }} · {{ doc.chunk_count || 0 }} chunks</small>
                                            <small v-if="deleteJobs[doc.filename]">{{ deleteJobs[doc.filename].message || deleteJobs[doc.filename].status }}</small>
                                        </div>
                                        <button
                                            class="danger-action compact-action"
                                            :disabled="deletingDocuments.includes(doc.filename)"
                                            @click="deleteGlobalDocument(doc.filename)"
                                        >
                                            <i :class="deletingDocuments.includes(doc.filename) ? 'fas fa-spinner fa-spin' : 'fas fa-trash'"></i>
                                            {{ deletingDocuments.includes(doc.filename) ? 'Deleting' : 'Delete' }}
                                        </button>
                                    </article>
                                </section>
                            </div>
                        </section>

                        <section v-if="activeNav === 'history'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Session History</h2>
                                    <p>Sessions are isolated by the current authenticated user.</p>
                                </div>
                                <button class="secondary-action" :disabled="loading.sessions" @click="loadSessions">
                                    <i :class="loading.sessions ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>
                            <div v-if="loading.sessions" class="empty-state">Loading sessions...</div>
                            <div v-else-if="sessions.length === 0" class="empty-state">No sessions yet.</div>
                            <div v-else class="session-list">
                                <article
                                    v-for="session in sessions"
                                    :key="session.session_id"
                                    :class="['session-item', {active: session.session_id === currentSessionId}]"
                                >
                                    <button class="session-main-action" @click="selectSession(session.session_id)">
                                        <span>{{ session.session_id }}</span>
                                    <small>{{ session.message_count }} messages · {{ formatDate(session.updated_at) }}</small>
                                    </button>
                                    <button
                                        class="danger-action compact-action"
                                        :disabled="deletingSessionIds.includes(session.session_id)"
                                        @click="deleteSession(session)"
                                    >
                                        <i :class="deletingSessionIds.includes(session.session_id) ? 'fas fa-spinner fa-spin' : 'fas fa-trash'"></i>
                                        {{ deletingSessionIds.includes(session.session_id) ? 'Deleting' : 'Delete' }}
                                    </button>
                                </article>
                            </div>
                        </section>

                        <section v-if="activeNav === 'memory'" class="panel memory-panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Memory / Project</h2>
                                    <p>Manage user-scoped project context and explicit memories. Memory is never used as citation evidence.</p>
                                </div>
                                <button class="secondary-action" :disabled="isLoadingMemory" @click="loadMemoryItems">
                                    <i :class="isLoadingMemory ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>

                            <div class="memory-layout">
                                <section class="memory-input-box">
                                    <h3>Create Research Project</h3>
                                    <input v-model="projectForm.name" type="text" :disabled="isCreatingProject" placeholder="Project name">
                                    <textarea v-model="projectForm.description" rows="3" :disabled="isCreatingProject" placeholder="Project goal, scope, or current direction"></textarea>
                                    <button class="primary-action" :disabled="isCreatingProject || !projectForm.name.trim()" @click="createProject">
                                        <i :class="isCreatingProject ? 'fas fa-spinner fa-spin' : 'fas fa-plus'"></i>
                                        {{ isCreatingProject ? 'Creating...' : 'Create Project' }}
                                    </button>

                                    <h3>Save as Memory</h3>
                                    <div class="memory-grid">
                                        <label>
                                            <span>Scope</span>
                                            <select v-model="memoryForm.scope" :disabled="isSavingMemory">
                                                <option value="global">global</option>
                                                <option value="project">project</option>
                                                <option value="paper">paper</option>
                                                <option value="session">session</option>
                                            </select>
                                        </label>
                                        <label>
                                            <span>Type</span>
                                            <select v-model="memoryForm.memory_type" :disabled="isSavingMemory">
                                                <option value="preference">preference</option>
                                                <option value="fact">fact</option>
                                                <option value="task">task</option>
                                                <option value="style">style</option>
                                                <option value="reviewer_issue">reviewer_issue</option>
                                            </select>
                                        </label>
                                    </div>
                                    <label>
                                        <span>Project</span>
                                        <select v-model="memoryForm.project_id" :disabled="isSavingMemory">
                                            <option value="">No project</option>
                                            <option v-for="project in projects" :key="project.id" :value="project.id">{{ project.name }}</option>
                                        </select>
                                    </label>
                                    <label>
                                        <span>Paper</span>
                                        <select v-model="memoryForm.paper_id" :disabled="isSavingMemory">
                                            <option value="">No paper</option>
                                            <option v-for="paper in papers" :key="paper.id" :value="paper.id">{{ formatPaperTitle(paper) }}</option>
                                        </select>
                                    </label>
                                    <textarea v-model="memoryForm.content" rows="7" :disabled="isSavingMemory" placeholder="Explicit memory content. Avoid sensitive personal information."></textarea>
                                    <div class="memory-actions">
                                        <button class="secondary-action" :disabled="isSavingMemory" @click="fillMemoryFromLatestAssistant">
                                            Latest Answer
                                        </button>
                                        <button class="secondary-action" :disabled="isSavingMemory" @click="fillMemoryFromUserInput">
                                            Current Input
                                        </button>
                                        <button class="primary-action" :disabled="isSavingMemory || !memoryForm.content.trim()" @click="saveMemoryItem">
                                            <i :class="isSavingMemory ? 'fas fa-spinner fa-spin' : 'fas fa-bookmark'"></i>
                                            {{ isSavingMemory ? 'Saving...' : 'Save Memory' }}
                                        </button>
                                    </div>
                                </section>

                                <section class="memory-output-box">
                                    <div class="memory-toolbar">
                                        <select v-model="selectedProjectId" :disabled="isLoadingMemory" @change="loadMemoryItems">
                                            <option value="">All projects</option>
                                            <option v-for="project in projects" :key="project.id" :value="project.id">{{ project.name }}</option>
                                        </select>
                                        <input v-model="memoryQuery" type="text" :disabled="isLoadingMemory" placeholder="Search memory">
                                        <button class="secondary-action" :disabled="isLoadingMemory" @click="loadMemoryItems">Search</button>
                                    </div>

                                    <h3>Projects</h3>
                                    <div v-if="isLoadingProjects" class="empty-state compact">Loading projects...</div>
                                    <div v-else-if="projects.length === 0" class="empty-state compact">No projects yet.</div>
                                    <div v-else class="project-list">
                                        <article v-for="project in projects" :key="project.id" class="project-card">
                                            <strong>{{ project.name }}</strong>
                                            <p>{{ project.description || 'No description.' }}</p>
                                            <small>{{ formatDate(project.updated_at) }}</small>
                                        </article>
                                    </div>

                                    <h3>Memories</h3>

                                <li v-for="(call, index) in toolCalls" :key="index">
                                    <strong>{{ call.name || 'tool' }}</strong>
                                    <span>{{ call.status || 'completed' }}</span>
                                    <small>{{ call.detail || call.input_summary || 'retrieval step' }}</small>
                                </li>
                            </ul>
                            </div>
                        </section>

                        <section class="panel mini-panel evidence-card">
                            <div class="evidence-card-header" @click="toggleEvidenceSection('warnings')">
                                <h2>Error / Warning</h2>
                                <span>{{ hasActiveWarnings() ? 'active' : 'ok' }}</span>
                                <button class="icon-action" type="button">
                                    <i :class="isEvidenceSectionCollapsed('warnings') ? 'fas fa-chevron-down' : 'fas fa-chevron-up'"></i>
                                </button>
                            </div>
                            <div v-show="!isEvidenceSectionCollapsed('warnings')">
                            <div v-if="!hasActiveWarnings()" class="empty-state compact">No active warnings.</div>
                            <p v-else class="warning-text warning-box">{{ errorMessage }}</p>
                            </div>
                        </section>
                    </aside>
                </div>
            </main>
        </template>
    </div>

    <script src="script.js"></script>
</body>
</html>
