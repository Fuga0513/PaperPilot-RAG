<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperPilot-RAG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" class="app-wrapper">
        <!-- Auth Screen -->
        <main v-if="!isAuthenticated" class="auth-screen">
            <section class="auth-panel">
                <div class="auth-brand">
                    <div class="auth-logo">PP</div>
                    <div>
                        <h1>PaperPilot-RAG</h1>
                        <p class="auth-subtitle">Research-Oriented Agentic RAG Assistant</p>
                    </div>
                </div>
                <p class="auth-description">请登录后管理你的科研论文库、会话和 RAG 工具。</p>

                <div v-if="authError" class="auth-alert auth-alert-error">{{ authError }}</div>
                <div v-if="authNotice" class="auth-alert auth-alert-success">{{ authNotice }}</div>

                <form class="auth-form" @submit.prevent="handleAuthSubmit">
                    <input v-model="authForm.username" type="text" autocomplete="username" placeholder="用户名" :disabled="authLoading">
                    <input v-model="authForm.password" type="password" autocomplete="current-password" placeholder="密码" :disabled="authLoading">
                    <select v-if="authMode === 'register'" v-model="authForm.role" :disabled="authLoading">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                    <input
                        v-if="authMode === 'register' && authForm.role === 'admin'"
                        v-model="authForm.admin_code"
                        type="password"
                        placeholder="管理员邀请码"
                        :disabled="authLoading"
                    >
                    <p v-if="authMode === 'register' && authForm.role === 'admin'" class="auth-help">
                        管理员账号需要填写后端 .env 中配置的 ADMIN_INVITE_CODE。
                    </p>
                    <button type="submit" class="primary-action" :disabled="authLoading || !authForm.username || !authForm.password">
                        <i v-if="authLoading" class="fas fa-spinner fa-spin"></i>
                        <span>{{ authLoading ? '提交中...' : (authMode === 'login' ? '登录' : '注册') }}</span>
                    </button>
                    <button type="button" class="text-action" :disabled="authLoading" @click="switchAuthMode">
                        {{ authMode === 'login' ? '没有账号？去注册' : '已有账号？去登录' }}
                    </button>
                </form>
            </section>
        </main>

        <!-- PaperPilot Main Shell -->
        <template v-else>
            <aside class="app-sidebar">
                <div class="sidebar-brand">
                    <div class="brand-mark">PP</div>
                    <div>
                        <strong>PaperPilot</strong>
                        <span>Agentic RAG</span>
                    </div>
                </div>

                <nav class="sidebar-nav">
                    <button @click="setActivePanel('library')" :class="['nav-btn', {active: activeNav === 'library'}]">
                        <i class="fas fa-book-open"></i> Paper Library
                    </button>
                    <button @click="setActivePanel('upload')" :class="['nav-btn', {active: activeNav === 'upload'}]">
                        <i class="fas fa-cloud-arrow-up"></i> Upload Paper
                    </button>
                    <button @click="handleNewChat" :class="['nav-btn', {active: activeNav === 'chat'}]">
                        <i class="fas fa-comments"></i> Chat with Papers
                    </button>
                    <button @click="handleHistory" :class="['nav-btn', {active: activeNav === 'history'}]">
                        <i class="fas fa-clock-rotate-left"></i> Session History
                    </button>
                </nav>

                <section class="sidebar-section">
                    <h3>Current Paper</h3>
                    <div v-if="selectedPaper" class="selected-paper">
                        <strong>{{ formatPaperTitle(selectedPaper) }}</strong>
                        <span>{{ selectedPaper.status }} · {{ formatDate(selectedPaper.created_at) }}</span>
                    </div>
                    <p v-else class="muted">No paper selected.</p>
                </section>

                <section class="sidebar-section">
                    <h3>Tools</h3>
                    <button class="tool-entry" @click="setActivePanel('library')">Paper Comparison</button>
                    <button class="tool-entry" @click="setActivePanel('reviewer')">Reviewer Analysis</button>
                    <button class="tool-entry" disabled>Research Writing</button>
                    <button class="tool-entry" disabled>Evaluation Report</button>
                </section>
            </aside>

            <main class="main-content">
                <header class="top-header">
                    <div>
                        <h1>PaperPilot-RAG</h1>
                        <p>Research-Oriented Agentic RAG Assistant</p>
                    </div>
                    <div class="header-user">
                        <div class="user-chip">
                            <span>{{ currentUser.username }}</span>
                            <small>{{ currentUser.role }}</small>
                        </div>
                        <button class="secondary-action" @click="logout()">
                            <i class="fas fa-right-from-bracket"></i> 退出登录
                        </button>
                    </div>
                </header>

                <div v-if="errorMessage" class="app-alert">
                    <span>{{ errorMessage }}</span>
                    <button @click="clearError"><i class="fas fa-xmark"></i></button>
                </div>

                <div class="workspace">
                    <section class="content-column">
                        <section v-if="activeNav === 'library'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Paper Library</h2>
                                    <p>Your uploaded papers are isolated by the current logged-in user.</p>
                                </div>
                                <button class="secondary-action" :disabled="loading.papers" @click="loadPapers">
                                    <i :class="loading.papers ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>
                            <div class="library-layout">
                                <div class="library-list">
                                    <section class="comparison-box">
                                        <div class="comparison-heading">
                                            <div>
                                                <strong>Paper Comparison</strong>
                                                <small>{{ selectedPaperCount }}/5 selected</small>
                                            </div>
                                            <button
                                                class="primary-action"
                                                :disabled="isComparingPapers || selectedPaperCount < 2"
                                                @click="compareSelectedPapers"
                                            >
                                                <i :class="isComparingPapers ? 'fas fa-spinner fa-spin' : 'fas fa-table-columns'"></i>
                                                {{ isComparingPapers ? 'Comparing...' : 'Compare Selected Papers' }}
                                            </button>
                                        </div>
                                        <textarea
                                            v-model="comparisonQuery"
                                            rows="2"
                                            :disabled="isComparingPapers"
                                            placeholder="Comparison focus"
                                        ></textarea>
                                        <p v-if="selectedPaperCount < 2" class="comparison-help">Select at least two papers from your private library.</p>
                                        <div v-if="comparisonResult" class="comparison-result" v-html="parseMarkdown(comparisonResult)"></div>
                                    </section>
                                    <div v-if="loading.papers" class="empty-state">Loading papers...</div>
                                    <div v-else-if="papers.length === 0" class="empty-state">No papers uploaded yet.</div>
                                    <div v-else class="paper-list">
                                        <article
                                            v-for="paper in papers"
                                            :key="paper.id"
                                            :class="['paper-item', {active: selectedPaper?.id === paper.id, selected: selectedPaperIds.includes(paper.id)}]"
                                        >
                                            <label class="paper-select-row">
                                                <input
                                                    type="checkbox"
                                                    :checked="selectedPaperIds.includes(paper.id)"
                                                    :disabled="isComparingPapers"
                                                    @change="togglePaperSelection(paper.id)"
                                                >
                                                <span>Select</span>
                                            </label>
                                            <i :class="getPaperIcon(paper.filename)"></i>
                                            <span>{{ formatPaperTitle(paper) }}</span>
                                            <small>{{ paper.authors || 'Authors pending' }}</small>
                                            <small>{{ paper.year || '-' }} · {{ paper.venue || 'Venue pending' }}</small>
                                            <small :class="['paper-status', paperStatusClass(paper.status)]">{{ paper.status }}</small>
                                            <small>Uploaded {{ formatDate(paper.created_at) }}</small>
                                            <button class="text-action paper-open-action" @click="selectPaper(paper)">Details</button>
                                        </article>
                                    </div>
                                </div>
                                <aside class="paper-detail">
                                    <div v-if="!selectedPaper" class="empty-state compact">Select a paper to view details.</div>
                                    <div v-else-if="loading.paperDetail" class="empty-state compact">Loading paper detail...</div>
                                    <template v-else>
                                        <h3>{{ formatPaperTitle(selectedPaperDetail || selectedPaper) }}</h3>
                                        <button
                                            class="secondary-action detail-action"
                                            :disabled="loading.paperDetail || isParsingPaper"
                                            @click="parseSelectedPaper"
                                        >
                                            <i :class="isParsingPaper ? 'fas fa-spinner fa-spin' : 'fas fa-wand-magic-sparkles'"></i>
                                            {{ isParsingPaper ? 'Parsing...' : 'Parse / Reparse' }}
                                        </button>
                                        <button
                                            class="secondary-action detail-action"
                                            :disabled="loading.paperDetail || isIndexingPaper || !selectedPaperDetail || selectedPaperDetail.chunk_count === 0"
                                            @click="indexSelectedPaper"
                                        >
                                            <i :class="isIndexingPaper ? 'fas fa-spinner fa-spin' : 'fas fa-database'"></i>
                                            {{ isIndexingPaper ? 'Indexing...' : 'Index / Reindex' }}
                                        </button>
                                        <dl>
                                            <dt>Authors</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).authors || 'Not available yet.' }}</dd>
                                            <dt>Abstract</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).abstract || 'Not available yet.' }}</dd>
                                            <dt>Status</dt>
                                            <dd>
                                                <span :class="['paper-status', paperStatusClass((selectedPaperDetail || selectedPaper).status)]">
                                                    {{ (selectedPaperDetail || selectedPaper).status }}
                                                </span>
                                                <span v-if="(selectedPaperDetail || selectedPaper).status === 'indexed'">Indexing completed.</span>
                                                <span v-if="(selectedPaperDetail || selectedPaper).status === 'index_failed'">Indexing failed.</span>
                                            </dd>
                                            <dt>Chunks</dt>
                                            <dd>{{ selectedPaperDetail?.chunk_count ?? 'Not parsed yet.' }}</dd>
                                            <dt>Filename</dt>
                                            <dd>{{ (selectedPaperDetail || selectedPaper).original_filename || (selectedPaperDetail || selectedPaper).filename }}</dd>
                                        </dl>
                                        <div class="metadata-box">
                                            <strong>Metadata</strong>
                                            <p v-if="(selectedPaperDetail || selectedPaper).status === 'metadata_failed'">Metadata extraction failed.</p>
                                            <p v-else-if="!(selectedPaperDetail && selectedPaperDetail.metadata)">Metadata not available yet.</p>
                                            <dl v-else class="metadata-detail-list">
                                                <dt>Contributions</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.contributions) }}</dd>
                                                <dt>Method Modules</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.method_modules) }}</dd>
                                                <dt>Datasets</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.datasets) }}</dd>
                                                <dt>Metrics</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.metrics) }}</dd>
                                                <dt>Limitations</dt>
                                                <dd>{{ formatMetadataValue(selectedPaperDetail.metadata.limitations) }}</dd>
                                            </dl>
                                        </div>
                                    </template>
                                </aside>
                            </div>
                        </section>

                        <section v-if="activeNav === 'upload'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Upload Paper</h2>
                                    <p>Upload PDF, DOCX, or TXT files into your private Paper Library.</p>
                                </div>
                            </div>
                            <div class="upload-area">
                                <input ref="fileInput" type="file" accept=".pdf,.docx,.txt" :disabled="isUploading" @change="handleFileSelect">
                                <div v-if="selectedFile" class="selected-file">
                                    <i class="fas fa-file"></i>
                                    <span>{{ selectedFile.name }}</span>
                                </div>
                                <button class="primary-action" :disabled="isUploading || !selectedFile" @click="uploadDocument">
                                    <i :class="isUploading ? 'fas fa-spinner fa-spin' : 'fas fa-cloud-arrow-up'"></i>
                                    {{ isUploading ? 'Uploading...' : 'Upload Paper' }}
                                </button>
                                <div v-if="uploadProgress" class="upload-status">{{ uploadProgress }}</div>
                                <div v-if="uploadSteps.length" class="upload-step-list">
                                    <div v-for="step in uploadSteps" :key="step.key" class="upload-step">
                                        <div class="upload-step-header">
                                            <span>{{ step.label }}</span>
                                            <small>{{ step.percent }}%</small>
                                        </div>
                                        <div class="upload-step-bar">
                                            <div class="upload-step-fill" :style="{ width: step.percent + '%' }"></div>
                                        </div>
                                        <p v-if="step.message">{{ step.message }}</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section v-if="activeNav === 'history'" class="panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Session History</h2>
                                    <p>Sessions are isolated by the current authenticated user.</p>
                                </div>
                                <button class="secondary-action" :disabled="loading.sessions" @click="loadSessions">
                                    <i :class="loading.sessions ? 'fas fa-spinner fa-spin' : 'fas fa-rotate'"></i> Refresh
                                </button>
                            </div>
                            <div v-if="loading.sessions" class="empty-state">Loading sessions...</div>
                            <div v-else-if="sessions.length === 0" class="empty-state">No sessions yet.</div>
                            <div v-else class="session-list">
                                <button
                                    v-for="session in sessions"
                                    :key="session.session_id"
                                    :class="['session-item', {active: session.session_id === currentSessionId}]"
                                    @click="selectSession(session.session_id)"
                                >
                                    <span>{{ session.session_id }}</span>
                                    <small>{{ session.message_count }} messages · {{ formatDate(session.updated_at) }}</small>
                                </button>
                            </div>
                        </section>

                        <section v-if="activeNav === 'reviewer'" class="panel reviewer-panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Reviewer Analysis</h2>
                                    <p>Analyze reviewer comments and draft a cautious, citation-backed rebuttal from your private papers.</p>
                                </div>
                            </div>

                            <div class="reviewer-layout">
                                <section class="reviewer-input-box">
                                    <label>
                                        <span>Target Paper</span>
                                        <select v-model="reviewPaperId" :disabled="isAnalyzingReview || isDraftingRebuttal">
                                            <option value="">All indexed papers</option>
                                            <option v-for="paper in papers" :key="paper.id" :value="paper.id">
                                                {{ formatPaperTitle(paper) }}
                                            </option>
                                        </select>
                                    </label>
                                    <label>
                                        <span>Reviewer Comments</span>
                                        <textarea
                                            v-model="reviewComments"
                                            rows="9"
                                            :disabled="isAnalyzingReview || isDraftingRebuttal"
                                            placeholder="Paste reviewer comments or decision letter text here."
                                        ></textarea>
                                    </label>
                                    <div class="reviewer-actions">
                                        <button class="secondary-action" :disabled="isAnalyzingReview || isDraftingRebuttal || !reviewComments.trim()" @click="analyzeReviewerComments">
                                            <i :class="isAnalyzingReview ? 'fas fa-spinner fa-spin' : 'fas fa-magnifying-glass-chart'"></i>
                                            {{ isAnalyzingReview ? 'Analyzing...' : 'Analyze Review' }}
                                        </button>
                                        <button class="primary-action" :disabled="isAnalyzingReview || isDraftingRebuttal || !reviewComments.trim()" @click="draftRebuttal">
                                            <i :class="isDraftingRebuttal ? 'fas fa-spinner fa-spin' : 'fas fa-pen-nib'"></i>
                                            {{ isDraftingRebuttal ? 'Drafting...' : 'Draft Rebuttal' }}
                                        </button>
                                    </div>
                                </section>

                                <section class="reviewer-output-box">
                                    <h3>Review Points</h3>
                                    <div v-if="reviewPoints.length === 0" class="empty-state compact">Analysis cards will appear here.</div>
                                    <div v-else class="review-point-list">
                                        <article v-for="(point, index) in reviewPoints" :key="index" class="review-point-card">
                                            <div class="review-point-header">
                                                <strong>Point {{ index + 1 }}</strong>
                                                <span>{{ point.issue_type }}</span>
                                                <small>{{ point.severity }}</small>
                                            </div>
                                            <p>{{ point.reviewer_original_comment }}</p>
                                            <dl>
                                                <dt>Strategy</dt>
                                                <dd>{{ point.response_strategy }}</dd>
                                                <dt>Required Action</dt>
                                                <dd>{{ point.required_action }}</dd>
                                                <dt>Evidence Needed</dt>
                                                <dd>{{ point.evidence_needed }}</dd>
                                            </dl>
                                        </article>
                                    </div>

                                    <div class="rebuttal-heading">
                                        <h3>Rebuttal Draft</h3>
                                        <button class="secondary-action" :disabled="!rebuttalDraft" @click="copyRebuttalDraft">
                                            <i class="fas fa-copy"></i> {{ rebuttalCopyStatus || 'Copy' }}
                                        </button>
                                    </div>
                                    <div v-if="!rebuttalDraft" class="empty-state compact">Draft output will appear after retrieval.</div>
                                    <div v-else class="rebuttal-draft" v-html="parseMarkdown(rebuttalDraft)"></div>
                                </section>
                            </div>
                        </section>

                        <section v-show="activeNav === 'chat'" class="chat-panel panel">
                            <div class="panel-header">
                                <div>
                                    <h2>Chat with Papers</h2>
                                    <p>Current session: {{ currentSessionId }}</p>
                                    <p v-if="papers.length > 0 && !hasIndexedPapers" class="chat-warning">Please index at least one paper before chatting with your Paper Library.</p>
                                </div>
                                <button class="secondary-action" @click="handleClearChat" :disabled="messages.length === 0 || isLoading">
                                    <i class="fas fa-eraser"></i> Clear
                                </button>
                            </div>

                            <div ref="chatContainer" class="chat-container">
                                <div v-if="messages.length === 0" class="welcome-screen">
                                    <h3>Ask your research question</h3>
                                    <p>Upload papers to your library, then ask PaperPilot-RAG to retrieve, cite, and reason over the knowledge base.</p>
                                </div>

                                <article v-for="(msg, index) in messages" :key="index" :class="['message', msg.isUser ? 'user-message' : 'bot-message']">
                                    <div v-if="!msg.isUser && msg.isThinking && !msg.text" class="message-content thinking-content">
                                        <strong>{{ latestThinkingLabel(msg) }}</strong>
                                        <div v-if="msg.ragSteps?.length" class="thinking-trace-lines">
                                            <div v-for="(step, sIdx) in msg.ragSteps" :key="sIdx" class="thinking-trace-line">
                                                <span>{{ step.icon || '-' }}</span>
                                                <span>{{ step.label }}</span>
                                                <small v-if="step.detail">{{ step.detail }}</small>
                                            </div>
                                        </div>
                                    </div>
                                    <div v-else class="message-content" v-html="msg.isUser ? escapeHtml(msg.text) : parseMarkdown(msg.text)"></div>
                                </article>
                            </div>

                            <div class="input-area-wrapper">
                                <div class="input-area">
                                    <textarea
                                        ref="textarea"
                                        v-model="userInput"
                                        rows="1"
                                        placeholder="Ask about your papers... (Shift+Enter for newline)"
                                        :disabled="isLoading"
                                        @keydown="handleKeyDown"
                                        @compositionstart="handleCompositionStart"
                                        @compositionend="handleCompositionEnd"
                                        @input="autoResize"
                                    ></textarea>
                                    <button class="secondary-action" :disabled="isLoading || !userInput" @click="clearInput">
                                        Clear
                                    </button>
                                    <button v-if="isLoading" class="danger-action" @click="handleStop">
                                        <i class="fas fa-stop"></i>
                                    </button>
                                    <button v-else class="primary-action send-action" :disabled="!userInput.trim()" @click="handleSend">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </section>
                    </section>

                    <aside class="inspector">
                        <section class="panel mini-panel">
                            <h2>Citations</h2>
                            <div v-if="citations.length === 0" class="empty-state compact">No citations returned.</div>
                            <div v-else class="citation-card-list">
                                <article
                                    v-for="item in citations"
                                    :key="item.citation_id || item.chunk_id"
                                    class="citation-card"
                                    @click="openCitationPaper(item)"
                                >
                                    <div class="citation-card-header">
                                        <span class="citation-badge">{{ item.citation_id }}</span>
                                        <strong>{{ item.paper_title || item.filename || 'Unknown source' }}</strong>
                                    </div>
                                    <div class="citation-meta">
                                        <span>{{ item.section_title || 'Unknown section' }}</span>
                                        <span>{{ formatCitationPages(item) }}</span>
                                    </div>
                                    <p>{{ item.preview_text || 'No preview text returned.' }}</p>
                                    <details class="citation-scores">
                                        <summary>Scores</summary>
                                        <div>score: {{ item.score ?? '-' }}</div>
                                        <div>rerank_score: {{ item.rerank_score ?? '-' }}</div>
                                        <div>chunk: {{ item.chunk_id || '-' }}</div>
                                    </details>
                                </article>
                            </div>
                        </section>

                        <section class="panel mini-panel">
                            <div class="trace-heading">
                                <h2>RAG Trace</h2>
                                <button class="icon-action" @click="traceExpanded = !traceExpanded">
                                    <i :class="traceExpanded ? 'fas fa-chevron-up' : 'fas fa-chevron-down'"></i>
                                </button>
                            </div>
                            <div v-if="!ragTrace" class="empty-state compact">Trace will appear after a RAG answer.</div>
                            <div v-else-if="traceExpanded" class="trace-list">
                                <div><strong>Original:</strong> {{ ragTrace.original_query || ragTrace.query || '-' }}</div>
                                <div><strong>Rewritten:</strong> {{ ragTrace.rewritten_query || ragTrace.expanded_query || '-' }}</div>
                                <div><strong>Strategy:</strong> {{ ragTrace.rewrite_strategy || ragTrace.expansion_type || '-' }}</div>
                                <div><strong>Stage:</strong> {{ ragTrace.retrieval_stage || '-' }}</div>
                                <div><strong>Mode:</strong> {{ ragTrace.retrieval_mode || '-' }}</div>
                                <div><strong>User filter:</strong> {{ yesNo(ragTrace.user_filter_applied ?? ragTrace.owner_filter_applied) }}</div>
                                <div><strong>Rerank:</strong> {{ yesNo(ragTrace.rerank_applied) }}</div>
                                <div><strong>Auto-merge:</strong> {{ yesNo(ragTrace.auto_merge_applied) }}</div>
                                <div v-if="ragTrace.fallback_reason"><strong>Fallback:</strong> {{ ragTrace.fallback_reason }}</div>
                                <details class="trace-results" :open="traceResultsExpanded" @toggle="traceResultsExpanded = $event.target.open">
                                    <summary>Retrieval Results</summary>
                                    <div v-for="key in ['first_retrieval_results', 'second_retrieval_results', 'selected_context_chunks']" :key="key" class="trace-result-group">
                                        <strong>{{ key.replaceAll('_', ' ') }}</strong>
                                        <div v-if="traceResults(key).length === 0" class="trace-empty">No data</div>
                                        <div v-for="(chunk, idx) in traceResults(key)" :key="key + (chunk.chunk_id || idx)" class="trace-chunk-row">
                                            <span>{{ traceChunkLabel(chunk, idx) }}</span>
                                            <small>score {{ formatScore(chunk.score) }} / rerank {{ formatScore(chunk.rerank_score) }}</small>
                                        </div>
                                    </div>
                                </details>
                            </div>
                        </section>

                        <section class="panel mini-panel">
                            <h2>Agent Tool Call</h2>
                            <div v-if="toolCalls.length === 0" class="empty-state compact">No tool calls yet.</div>
                            <ul v-else class="tool-call-list">
                                <li v-for="(call, index) in toolCalls" :key="index">
                                    <strong>{{ call.name }}</strong>
                                    <span>{{ call.detail }}</span>
                                </li>
                            </ul>
                        </section>

                        <section class="panel mini-panel">
                            <h2>Error / Warning</h2>
                            <div v-if="!errorMessage" class="empty-state compact">No active warnings.</div>
                            <p v-else class="warning-text">{{ errorMessage }}</p>
                        </section>
                    </aside>
                </div>
            </main>
        </template>
    </div>
